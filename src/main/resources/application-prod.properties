# --- Banco PostgreSQL ---
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=${DB_DRIVER}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.jpa.database-platform=${DB_DIALECT}

# --- H2 DESABILITADO ---
spring.h2.console.enabled=false

# --- Hibernate (apenas verifica, nunca altera) ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# --- Flyway HABILITADO ---
spring.flyway.enabled=true

# --- Mail ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}

# --- JWT ---
lootsafe.jwt.secret=${JWT_SECRET}
lootsafe.jwt.expiration=${JWT_EXPIRATION:60}

# --- Chaves de segurança (OBRIGATÓRIAS) ---
lootsafe.security.encryption-key=${LOOTSAFE_CRYPTO_KEY}
lootsafe.security.admin-api-key=${LOOTSAFE_ADMIN_API_KEY}
lootsafe.access-token=${LOOTSAFE_MP_TOKEN}
lootsafe.secret-key=${SECRET_KEY}

# --- Logs reduzidos ---
logging.level.root=WARN
logging.level.com.lootsafe=INFO
logging.level.com.lootsafe.security.ApiKeyFilter=INFO
logging.level.com.lootsafe.config.SecurityConfig=INFO
logging.level.org.springframework.security=WARN

# --- Actuator (health check) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
