# --- Servidor ---
server.port=8080
server.servlet.context-path=/
spring.application.name=lootsafe
spring.main.banner-mode=log

# --- Upload ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Timezone ---
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# --- Cookie ---
server.servlet.cookie.same-site=lax


# --- LootSafe (Regras de negócio globais) ---
lootsafe.platform-fee-rate=0.10
lootsafe.deadlines.max-trial-hours=72

# --- Logging ---
logging.file.name=logs/lootsafe.log