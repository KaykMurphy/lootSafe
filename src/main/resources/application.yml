spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: kayksantana133@gmail.com
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  config:
    import: optional:file:.env[.properties]

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:lootsafedb
    driver-class-name: org.h2.Driver
    username: sa
    password: 1234

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  file:
    name: logs/lootsafe.log
  level:
    root: INFO
    com.lootsafe.security.ApiKeyFilter: DEBUG
    com.lootsafe.config.SecurityConfig: DEBUG
    org.springframework.security: WARN

lootsafe:
  platform-fee-rate: 0.10
  security:
    encryption-key: ${LOOTSAFE_CRYPTO_KEY_APP:${LOOTSAFE_CRYPTO_KEY}}
    admin-api-key: ${LOOTSAFE_ADMIN_API_KEY}
  deadlines:
    max-trial-hours: 72
  access-token: ${LOOTSAFE_MP_TOKEN:default_token}
  secret-key: ${SECRET_KEY}
  jwt:
    secret: 7f0d9a6c8e4b2f1a93c7d5e8b0a6f4c2d9e1a7b5c3f8e6d0a2b4c9f1e8d7a6b3
    expiration: 60



