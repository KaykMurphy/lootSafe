<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LootSafe Chat Test</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fa;
            --panel: #ffffff;
            --text: #17202a;
            --muted: #627084;
            --line: #d7dee8;
            --primary: #1769aa;
            --primary-dark: #0f4f82;
            --ok: #1f7a45;
            --danger: #b3261e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        main {
            width: min(960px, calc(100vw - 32px));
            margin: 32px auto;
            display: grid;
            gap: 16px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .status {
            min-width: 128px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--panel);
            padding: 8px 12px;
            font-size: 0.875rem;
            color: var(--muted);
            text-align: center;
        }

        .status.connected {
            color: var(--ok);
        }

        .status.disconnected {
            color: var(--danger);
        }

        .toolbar,
        .composer,
        .chat {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 12px;
            padding: 14px;
        }

        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 0.8125rem;
            font-weight: 600;
        }

        input,
        select,
        button {
            min-height: 40px;
            border-radius: 6px;
            font: inherit;
        }

        input,
        select {
            width: 100%;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            padding: 0 12px;
        }

        button {
            border: 0;
            background: var(--primary);
            color: #fff;
            padding: 0 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: var(--primary-dark);
        }

        button.secondary {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
        }

        button.secondary:hover {
            background: #eef3f8;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .chat {
            min-height: 420px;
            max-height: 60vh;
            overflow: auto;
            padding: 16px;
        }

        .message {
            display: grid;
            gap: 4px;
            border-bottom: 1px solid #edf1f5;
            padding: 10px 0;
        }

        .message:first-child {
            padding-top: 0;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.8125rem;
        }

        .author {
            color: var(--primary-dark);
            font-weight: 800;
        }

        .text {
            overflow-wrap: anywhere;
            line-height: 1.45;
        }

        .composer {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            padding: 14px;
        }

        .empty {
            color: var(--muted);
            text-align: center;
            padding: 96px 16px;
        }

        @media (max-width: 720px) {
            main {
                width: min(100vw - 20px, 960px);
                margin: 16px auto;
            }

            header,
            .toolbar,
            .composer {
                grid-template-columns: 1fr;
                align-items: stretch;
            }

            header {
                display: grid;
            }

            .status {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<main>
    <header>
        <h1>LootSafe Chat Test</h1>
        <div id="status" class="status disconnected">Disconnected</div>
    </header>

    <section class="toolbar" aria-label="Connection controls">
        <label>
            Author
            <select id="author">
                <option value="BUYER">Buyer</option>
                <option value="SELLER">Seller</option>
                <option value="MODERATOR">Moderator</option>
            </select>
        </label>
        <button id="connectButton" type="button">Connect</button>
        <button id="disconnectButton" class="secondary" type="button" disabled>Disconnect</button>
    </section>

    <section id="messages" class="chat" aria-live="polite">
        <div class="empty">No messages yet.</div>
    </section>

    <form id="messageForm" class="composer">
        <input id="messageText" placeholder="Type a message" autocomplete="off" disabled>
        <button id="sendButton" type="submit" disabled>Send</button>
    </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    const statusEl = document.querySelector("#status");
    const messagesEl = document.querySelector("#messages");
    const authorEl = document.querySelector("#author");
    const connectButton = document.querySelector("#connectButton");
    const disconnectButton = document.querySelector("#disconnectButton");
    const messageForm = document.querySelector("#messageForm");
    const messageTextEl = document.querySelector("#messageText");
    const sendButton = document.querySelector("#sendButton");

    let stompClient = null;

    function setConnected(connected) {
        statusEl.textContent = connected ? "Connected" : "Disconnected";
        statusEl.className = connected ? "status connected" : "status disconnected";
        connectButton.disabled = connected;
        disconnectButton.disabled = !connected;
        messageTextEl.disabled = !connected;
        sendButton.disabled = !connected;
    }

    function formatDate(value) {
        if (!value) {
            return "pending";
        }

        return new Date(value).toLocaleString();
    }

    function appendMessage(message) {
        const emptyEl = messagesEl.querySelector(".empty");
        if (emptyEl) {
            emptyEl.remove();
        }

        const wrapper = document.createElement("article");
        wrapper.className = "message";

        const meta = document.createElement("div");
        meta.className = "meta";

        const author = document.createElement("span");
        author.className = "author";
        author.textContent = message.author || "UNKNOWN";

        const date = document.createElement("span");
        date.textContent = formatDate(message.sentAt);

        const type = document.createElement("span");
        type.textContent = message.messageType || "CHAT";

        const text = document.createElement("div");
        text.className = "text";
        text.textContent = message.messageText || "";

        meta.append(author, date, type);
        wrapper.append(meta, text);
        messagesEl.append(wrapper);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function loadHistory() {
        const response = await fetch("/api/chat/history");
        if (!response.ok) {
            throw new Error("Could not load chat history");
        }

        const messages = await response.json();
        messagesEl.innerHTML = "";

        if (messages.length === 0) {
            messagesEl.innerHTML = '<div class="empty">No messages yet.</div>';
            return;
        }

        messages.forEach(appendMessage);
    }

    function connect() {
        const socket = new SockJS("/portfolio");
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, () => {
            setConnected(true);
            loadHistory().catch((error) => appendMessage({
                author: "SYSTEM",
                messageText: error.message,
                sentAt: new Date().toISOString(),
                messageType: "ERROR"
            }));

            stompClient.subscribe("/topic/public", (frame) => {
                appendMessage(JSON.parse(frame.body));
            });
        }, () => {
            setConnected(false);
        });
    }

    function disconnect() {
        if (stompClient) {
            stompClient.disconnect(() => setConnected(false));
            stompClient = null;
        } else {
            setConnected(false);
        }
    }

    function sendMessage(event) {
        event.preventDefault();
        const text = messageTextEl.value.trim();
        if (!text || !stompClient) {
            return;
        }

        stompClient.send("/app/chat.send", {}, JSON.stringify({
            author: authorEl.value,
            messageText: text,
            messageType: "CHAT"
        }));

        messageTextEl.value = "";
        messageTextEl.focus();
    }

    connectButton.addEventListener("click", connect);
    disconnectButton.addEventListener("click", disconnect);
    messageForm.addEventListener("submit", sendMessage);
    window.addEventListener("beforeunload", disconnect);
</script>
</body>
</html>
